name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Ruff lint
        run: ruff check .

      - name: Smoke tests
        run: pytest

  deploy:
    runs-on: ubuntu-latest
    needs: lint-and-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger backend deploy
        if: secrets.RENDER_BACKEND_DEPLOY_HOOK_URL != ''
        run: curl -fsS -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}"

      - name: Trigger frontend deploy
        if: secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL != ''
        run: curl -fsS -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}"

      - name: No deploy hooks configured
        if: secrets.RENDER_BACKEND_DEPLOY_HOOK_URL == '' && secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL == ''
        run: echo "Configure os secrets de deploy do Render para ativar esta etapa."
